<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Markdown Preview</title>
    <script src="./marked.min.js"></script>
    <script src="./highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1F1F24;
            color: #d4d4d4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            padding: 12px;
            overflow-y: auto;
        }

        /* Headings */
        h1, h2, h3, h4, h5, h6 {
            color: #e0e0e0;
            margin-top: 16px;
            margin-bottom: 8px;
            font-weight: 600;
            line-height: 1.3;
        }

        h1 { font-size: 1.8em; color: #BC5662; border-bottom: 1px solid #3d3d3d; padding-bottom: 6px; }
        h2 { font-size: 1.5em; color: #D47440; border-bottom: 1px solid #3d3d3d; padding-bottom: 4px; }
        h3 { font-size: 1.25em; color: #ECBC47; }
        h4 { font-size: 1.1em; color: #5CB98F; }
        h5 { font-size: 1em; color: #5387C7; }
        h6 { font-size: 0.9em; color: #8968A2; }

        /* Links */
        a {
            color: #58a6ff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }

        strong { color: #FF5858; font-weight: bold; }
        em { color: #99C696; font-style: italic; }

        /* Inline code */
        code {
            background-color: #2d2d2d;
            color: #e06c75;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
            font-size: 0.9em;
        }

        /* Code blocks - VitePress style */
        pre {
            background-color: #2E2E32;
            border: 1px solid #3d3d3d;
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
            overflow-x: auto;
            position: relative;
        }

        pre code {
            background: none;
            color: inherit;
            padding: 0;
            border-radius: 0;
            font-size: 0.875em;
            line-height: 1.5;
        }

        /* Language label (clickable for copy) */
        .lang-label {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 0.75em;
            color: #888;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            text-transform: uppercase;
            cursor: pointer;
            user-select: none;
            padding: 2px 6px;
            border-radius: 4px;
            transition: color 0.2s, background-color 0.2s;
        }
        .lang-label:hover {
            color: #d4d4d4;
            background-color: #3d3d3d;
        }
        .lang-label.copied {
            color: #3fb950;
        }

        /* Blockquotes */
        blockquote {
            border-left: 4px solid #58a6ff;
            padding: 8px 16px;
            margin: 12px 0;
            background-color: #252526;
            border-radius: 0 4px 4px 0;
            color: #b0b0b0;
        }

        /* Callout / Admonition Blocks */
        .callout {
            padding: 12px 16px;
            margin: 12px 0;
            border-radius: 8px;
            border: 1px solid;
            white-space: pre-line;
        }
        .callout-title {
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: normal;
        }
        .callout-note { border-color: #58a6ff; background-color: #1a2332; }
        .callout-note .callout-title { color: #58a6ff; }
        .callout-tip { border-color: #3fb950; background-color: #1a2e1a; }
        .callout-tip .callout-title { color: #3fb950; }
        .callout-warning { border-color: #d29922; background-color: #2e251a; }
        .callout-warning .callout-title { color: #d29922; }
        .callout-caution { border-color: #f85149; background-color: #2e1a1a; }
        .callout-caution .callout-title { color: #f85149; }
        .callout-quote { border-color: #8b949e; background-color: #252526; }
        .callout-quote .callout-title { color: #8b949e; }

        /* Lists */
        ul, ol {
            padding-left: 24px;
            margin: 8px 0;
        }

        li {
            margin: 4px 0;
        }

        li::marker {
            color: #888;
        }

        /* Tables */
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }

        th, td {
            border: 1px solid #3d3d3d;
            padding: 8px 12px;
            text-align: left;
        }

        th {
            background-color: #2d2d2d;
            font-weight: 600;
            color: #e0e0e0;
        }

        tr:nth-child(even) {
            background-color: #252526;
        }

        /* Horizontal rule */
        hr {
            border: none;
            border-top: 1px solid #3d3d3d;
            margin: 16px 0;
        }

        /* Images */
        img {
            max-width: 100%;
            border-radius: 4px;
        }

        /* Task lists */
        li:has(input[type="checkbox"]) {
            list-style: none;
            padding-left: 0;
        }
        li:has(input[type="checkbox"]) input[type="checkbox"] {
            margin-left: -22px;
            margin-right: 6px;
            vertical-align: middle;
            accent-color: #58a6ff;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1F1F24;
        }

        ::-webkit-scrollbar-thumb {
            background: #3d3d3d;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4d4d4d;
        }

        /* Highlight.js overrides for VitePress-like colors */
        .hljs {
            background: transparent !important;
            padding: 0 !important;
        }

        .hljs-keyword { color: #c678dd; }
        .hljs-built_in { color: #e5c07b; }
        .hljs-type { color: #e5c07b; }
        .hljs-literal { color: #56b6c2; }
        .hljs-number { color: #d19a66; }
        .hljs-string { color: #98c379; }
        .hljs-comment { color: #7f848e; font-style: italic; }
        .hljs-doctag { color: #c678dd; }
        .hljs-function { color: #61afef; }
        .hljs-title { color: #61afef; }
        .hljs-params { color: #d4d4d4; }
        .hljs-meta { color: #c678dd; }
        .hljs-operator { color: #56b6c2; }
        .hljs-punctuation { color: #d4d4d4; }
        .hljs-tag { color: #e06c75; }
        .hljs-attr { color: #d19a66; }
        .hljs-attribute { color: #d19a66; }
        .hljs-selector-class { color: #e5c07b; }
        .hljs-selector-id { color: #61afef; }
        .hljs-selector-tag { color: #e06c75; }
        .hljs-variable { color: #d4d4d4; }
        .hljs-subst { color: #d4d4d4; }
        .hljs-section { color: #61afef; }
        .hljs-bullet { color: #d4d4d4; }
        .hljs-emphasis { font-style: italic; }
        .hljs-strong { font-weight: bold; }
        .hljs-addition { color: #98c379; }
        .hljs-deletion { color: #e06c75; }
    </style>
</head>
<body>
    <div id="content"></div>

    <script>
        // Render markdown text and update the content div
        window.renderMarkdown = function(text) {
            // Parse markdown to HTML (marked handles escaping internally)
            var html = marked.parse(text, {
                gfm: true,
                breaks: false
            });

            // Update content
            document.getElementById('content').innerHTML = html;

            // Apply syntax highlighting and add clickable language labels
            var codeBlocks = document.querySelectorAll('pre code');
            for (var i = 0; i < codeBlocks.length; i++) {
                (function() {
                    var codeEl = codeBlocks[i];
                    var preEl = codeEl.parentElement;
                    var lang = '';

                    // Extract language from class
                    var classes = codeEl.className.split(' ');
                    for (var j = 0; j < classes.length; j++) {
                        if (classes[j].startsWith('language-')) {
                            lang = classes[j].substring(9);
                            break;
                        }
                    }

                    // Add clickable language label for copy
                    if (lang) {
                        var label = document.createElement('span');
                        label.className = 'lang-label';
                        label.textContent = lang;
                        label.addEventListener('click', function() {
                            var code = codeEl.textContent;
                            // Use execCommand for QWebEngineView compatibility
                            var ta = document.createElement('textarea');
                            ta.value = code;
                            ta.style.position = 'fixed';
                            ta.style.left = '-9999px';
                            document.body.appendChild(ta);
                            ta.select();
                            document.execCommand('copy');
                            document.body.removeChild(ta);
                            
                            label.textContent = '复制成功';
                            label.classList.add('copied');
                            setTimeout(function() {
                                label.textContent = lang;
                                label.classList.remove('copied');
                            }, 2000);
                        });
                        preEl.appendChild(label);
                    }

                    hljs.highlightElement(codeEl);
                })();
            }

            // Process callout/admonition blocks
            var blockquotes = document.querySelectorAll('blockquote');
            for (var i = blockquotes.length - 1; i >= 0; i--) {
                var bq = blockquotes[i];
                var firstP = bq.querySelector('p');
                if (!firstP) continue;

                var text = firstP.textContent;
                var match = text.match(/^\[!(note|tip|warning|caution|quote)\]\s*/i);
                if (!match) continue;

                var type = match[1].toLowerCase();
                var titles = {
                    'note': 'Note',
                    'tip': 'Tip',
                    'warning': 'Warning',
                    'caution': 'Caution',
                    'quote': 'Quote'
                };

                // Create callout container
                var callout = document.createElement('div');
                callout.className = 'callout callout-' + type;

                var titleDiv = document.createElement('div');
                titleDiv.className = 'callout-title';
                titleDiv.textContent = titles[type];
                callout.appendChild(titleDiv);

                // Remove the [!type] prefix from first paragraph
                var remainingText = text.substring(match[0].length).trim();
                if (remainingText) {
                    firstP.textContent = remainingText;
                    callout.appendChild(firstP);
                }

                // Move remaining sibling elements from blockquote to callout
                var next;
                var child = firstP.nextSibling;
                while (child) {
                    next = child.nextSibling;
                    callout.appendChild(child);
                    child = next;
                }

                // Replace blockquote with callout
                bq.parentNode.replaceChild(callout, bq);
            }
        };
    </script>
</body>
</html>
